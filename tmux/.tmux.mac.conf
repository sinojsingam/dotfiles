set-option -g default-terminal "screen-256color"
set-option -sa terminal-overrides 'xterm-256color:Tc'
set-option default-command "/bin/bash"
set -g history-limit 1000000
set -g clock-mode-style 12
set -g focus-events on
set -g status-keys vi
set -gs escape-time 0
 
# Use Vim keybindings in copy mode
setw -g mode-keys vi
# copy mode binding (by default it is [)
bind j copy-mode
# Optional: easier copy-to-clipboard in Vim-style
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send -X copy-line
# enable clipboard (OSC 52)
set -g set-clipboard on
 
# reload config file
bind r source-file ~/.tmux.conf
 
# remap leader key to ^F
unbind C-b
unbind M-f
set-option -g prefix C-f
bind-key C-f send-prefix
 
# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %
 
# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
 
# Unbind default keys for finding and zooming
unbind f
unbind z
# Rebind f to toggle-pane-zoom
bind f resize-pane -Z
# Rebind z to find-window
# bind z find-window
 
# start windows and pane numbering with index 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1
set-option -wg automatic-rename on
set-window-option -g automatic-rename on
set -g allow-rename on
# renumber all windows when any window is closed
set -g renumber-windows on
 
# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
run ~/.tmux/plugins/tmux/catppuccin.tmux
 
# --- catppuccin window/status config ---
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text " #W "
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_window_text " #W "
 
# --- aktives/inaktives Window hervorheben ---
# Format-Strings (lazy expandiert) -> @ctp_* sind hier ok
# inaktiv: gedämpft, mit Window-Index
set -gF window-status-format "#[bg=#{@ctp_surface_0},fg=#{@ctp_overlay_1}] #I #W "
# aktiv: kräftiges mauve, fett, mit Zoom-Indikator
set -gF window-status-current-format "#[bg=#{@ctp_mauve},fg=#{@ctp_crust},bold] #I #W#{?window_zoomed_flag,  ,} "
 
# --- aktives/inaktives Pane: Border ---
# Style-Optionen werden beim Sourcen hart validiert -> feste Hex-Werte
# (Catppuccin Mocha: surface_1 #45475a, mauve #cba6f7)
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7,bold"
 
# --- inaktive Panes per Hintergrund dimmen ---
# wirkt bei Programmen ohne eigenen BG (Log-Tails, Shells);
# nvim/TUIs mit eigenem Colorscheme ignorieren das.
# (Catppuccin Mocha: crust #11111b, base #1e1e2e)
set -g window-style "bg=#11111b"
set -g window-active-style "bg=#1e1e2e"
 
# --- optional: beschriftete Border, aktiv farbig hervorgehoben ---
# Bei Bedarf einkommentieren (kostet 1 Zeile Höhe pro Pane).
# set -g pane-border-status top
# set -g pane-border-format "#{?pane_active,#[fg=#11111b#,bg=#cba6f7#,bold],#[fg=#6c7086]} #P #{pane_current_command} "
 
# --- status bar modules ---
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right-length 100
set -g status-left-length 100
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
 
# --- remaining plugins ---
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @resurrect-capture-pane-contents 'on' # allow tmux-resurrect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality
 
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
